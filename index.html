<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Ícone padrão do browser (favicon) -->
    <link rel="icon" type="image/jpg" href="/favicon.jpg" />

    <!-- Ícone para iOS ao adicionar à tela inicial (apple-touch-icon) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA: fundo da splash screen no iOS (mesma cor do manifest) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Soluteg" />

    <!-- PWA: cor da barra de endereço no Android Chrome -->
    <meta name="theme-color" content="#141820" />

    <!-- O manifest.webmanifest é injetado automaticamente pelo vite-plugin-pwa -->

    <title>%VITE_APP_TITLE%</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
   <!-- <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script> -->
  </body>

</html>
